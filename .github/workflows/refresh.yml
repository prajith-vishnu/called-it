# ============================================================================
# Predictions refresh — runs OFTEN, but can NEVER exceed the Groq free tier.
#
# HOW "never cross the limit" is guaranteed (defense in depth):
#   1. Low volume by design: hourly × a tiny prompt (a few predictions) is far
#      under Groq's per-minute and per-day limits, and calls are spaced an hour
#      apart so we never burst.
#   2. Header-aware budget guard (server/lib/ratelimit.js): before every call it
#      reads Groq's remaining-requests/-tokens headers and STOPS at 80% of the
#      budget; on a 429 it backs off. If the budget is low, the run simply skips.
#   3. That guard's state (server/data/ratelimit.json) is PERSISTED between runs
#      via actions/cache, so the 80% ceiling holds across the whole day — not
#      just within one run.
#
# If a run skips or fails, nothing breaks: GitHub Pages keeps serving the last
# committed predictions.json, so THE SITE IS ALWAYS UP.
#
# The GROQ_API_KEY lives ONLY in repo Secrets (Settings → Secrets → Actions).
# ============================================================================
name: Predictions refresh

on:
  schedule:
    - cron: "0 * * * *"       # every hour
  workflow_dispatch: {}        # manual run from the Actions tab

permissions:
  contents: write             # commit predictions.json

concurrency:
  group: predictions-refresh  # never run two at once (no bursting)
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Persist the prediction cache + rate-limit budget between runs so the
      # 80%-of-budget guard and accumulation survive across the day.
      - name: Restore cache + rate-limit state
        uses: actions/cache@v4
        with:
          path: |
            server/data/cache.json
            server/data/ratelimit.json
          key: called-it-data-${{ github.run_id }}
          restore-keys: |
            called-it-data-

      - name: Generate + safety-filter predictions (skips itself if near budget)
        working-directory: server
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}   # the ONLY place the key exists
        run: node scripts/refresh-cli.js --force

      - name: Commit predictions.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions.json
          git diff --cached --quiet || git commit -m "chore: predictions refresh [skip ci]"
          git push
